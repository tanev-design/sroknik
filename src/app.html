<!doctype html>
<html lang="bg">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
    <link rel="icon" type="image/png" sizes="32x32" href="%sveltekit.assets%/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="%sveltekit.assets%/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="%sveltekit.assets%/apple-touch-icon.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-visual"
    />
    <meta name="theme-color" content="#1E5C3A" />
    <meta
      name="description"
      content="Срокник е личен календар за важни срокове: коли, документи и плащания, подредени локално на устройството."
    />
    <link rel="canonical" href="https://sroknik.com/" />
    <meta property="og:site_name" content="Срокник" />
    <meta property="og:title" content="Срокник — личен календар за важни срокове" />
    <meta property="og:description" content="Винетка, ГО, технически преглед, лична карта, паспорт и сметки — Срокник ти напомня навреме. Работи офлайн. Данните остават при теб." />
    <meta property="og:url" content="https://sroknik.com/" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="bg_BG" />
    <meta property="og:image" content="https://sroknik.com/og.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Срокник — личен календар за важни срокове" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Срокник — личен календар за важни срокове" />
    <meta name="twitter:description" content="Коли, документи, плащания. Напомня навреме. Работи офлайн." />
    <meta name="twitter:image" content="https://sroknik.com/og.png" />
    <meta name="twitter:image:alt" content="Срокник — личен календар за важни срокове" />
    <script>
      (function () {
        try {
          var r = document.documentElement;
          r.style.setProperty('--app-height', window.innerHeight + 'px');
          var raw = localStorage.getItem('sroknik.settings.v1');
          var theme = 'system';
          if (raw) {
            try { var p = JSON.parse(raw); if (p && p.theme) theme = p.theme; } catch (_) {}
          }
          var dark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) r.classList.add('dark');
        } catch (_) {}
      })();
    </script>
    <style>
      html, body { background: var(--color-bg, #F9F7F4); }
      html.is-loading body { opacity: 0; }
      body { opacity: 1; transition: opacity 180ms ease-out; }
    </style>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" class="bg-bg text-text antialiased">
    <div style="display: contents">%sveltekit.body%</div>
    <script>
      document.documentElement.classList.add('is-loading');
      window.addEventListener('load', function () {
        requestAnimationFrame(function () {
          document.documentElement.classList.remove('is-loading');
        });
      });
    </script>
  </body>
</html>
